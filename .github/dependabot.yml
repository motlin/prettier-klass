version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 1
    labels:
      - "dependencies"
    groups:
      typescript-ecosystem:
        patterns:
          - "typescript"
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
      tree-sitter:
        patterns:
          - "web-tree-sitter"
          - "tree-sitter-cli"
      lint:
        patterns:
          - "oxlint"
          - "prettier"
    commit-message:
      prefix: "dependabot"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 1
    labels:
      - "dependencies"
    commit-message:
      prefix: "dependabot"
      include: "scope"
